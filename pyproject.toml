[project]
name = "majordom-zigbee"
version = "0.1.2"
description = "Zigbee integration for MajorDom — bridges Zigbee devices into the MajorDom language."
authors = [{ name = "Mark Parker", email = "mark@parker-programs.com" }]
readme = "README.md"
requires-python = ">=3.12,<3.14"
dependencies = [
    "majordom-integration-sdk (>=0.1,<1.0)",
    "zigpy (>=0.88.0,<0.89.0)",
    "zigpy-znp (>=0.14.2,<0.15.0)",
    "bellows (>=0.49.1,<0.50.0)",
]

[dependency-groups]
dev = [
    "poethepoet (>=0.36.0,<1.0.0)",
    "ty", "ruff", "pip-audit",
    "pytest", "pytest-asyncio", "pytest-cov", "pytest-timeout", "pytest-repeat",
    "pytest-benchmark", "pytest-profiling", "pytest-resource-usage", "coverage",
    "pympler", "psutil", "faker",
]

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
requires-poetry = ">=2.0"
packages = [{ include = "majordom_zigbee" }]

# DEV-MODE: local path to the private SDK. Switch to the published PyPI package when going public.
[tool.poetry.dependencies]

[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = ["."]
filterwarnings = ["once"]

[tool.coverage.run]
omit = ["tests/*"]

[tool.ruff]
line-length = 120
indent-width = 4

[tool.ruff.lint]
select = ["E", "F", "UP", "B", "SIM", "I"]
fixable = ["ALL"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
docstring-code-format = true

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/*" = ["E402"]

# Migrated from the Hub (type-checked there under mypy). 14 frictions with zigpy's interface
# types (str|None ieee into EUI64 conversions, Status/read_attributes types) and internal
# _zb_path helpers. Scoped rather than rewritten blind — the unit suite only exercises a
# subset of the ZCL surface, so tightening these needs more coverage first.
# TODO: broaden the mocked coverage, then fix and drop this block (cf. the HomeKit cleanup).
[[tool.ty.overrides]]
include = ["majordom_zigbee/**"]

[tool.ty.overrides.rules]
invalid-argument-type = "ignore"
unresolved-attribute = "ignore"

# The zigpy ControllerApplication test double intentionally uses loose signatures.
[[tool.ty.overrides]]
include = ["tests/**"]

[tool.ty.overrides.rules]
invalid-method-override = "ignore"
invalid-assignment = "ignore"
invalid-argument-type = "ignore"

[tool.poe.tasks.install]
shell = """
poetry install
echo '#!/bin/sh\npoetry run poe check' > .git/hooks/pre-commit
chmod +x .git/hooks/pre-commit
echo "Pre-commit hook installed."
"""

[tool.poe.tasks.check]
shell = """
code=0
echo "\nRunning ruff lint:"
poetry run ruff check --fix || code=1
echo "\nRunning ruff format:"
poetry run ruff format || code=1
echo "\nRunning ty:"
poetry run ty check || code=1
echo "\nRunning pytest:"
poetry run pytest --cov=majordom_zigbee --cov-report=xml || code=1
echo "\nRunning poetry build:"
poetry build || code=1
echo "\nRunning poetry check:"
poetry check || code=1
${ci:+git diff --exit-code}
exit $code
"""
args = [{ name = "ci", type = "boolean" }]
